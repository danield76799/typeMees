name: typetopia
description: "Typetopia - De stoerste typecursus van Nederland! Voor kinderen van 8-12 jaar."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  shared_preferences: ^2.2.0
  confetti: ^0.8.0
  flutter_svg: ^2.0.9
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/fonts/